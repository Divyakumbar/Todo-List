<html>
    <head>
        <title>Register</title>
        <link rel="stylesheet" href="static/style.css">
        <nav>
        <a href="/home">Home</a>
        </nav>
    </head>
    <body>
        <img src="static/images/about1.jpg" width="100%" height="100%" alt="Home">
        <div class="nav-container">
        <h1>Register</h1>
        <form method="post" action="/register">
            <input type="username" placeholder="User Name" name="username" required>
            <input type="email" placeholder="Email ID" name="email" required>
            <input type="number" placeholder="Phone Number" name="number" required>
            <input type="password" placeholder="Password" name="password" required>
            <input type="password" name="Confirm_password placeholder="Confirm Password" required>
            <input type="checkbox" name="Terms" required>I agreed to Terms and Conditions
            <button type="submit" name="Register">Register</button>
        </form>
        <a href="/login">Login</a>
        </div>
    </body>
</html>
