<html>
    <head>
        <title>Task</title>
        <link rel="stylesheet" href="static/style.css"></head>
        <nav>
            <a href="/home">Home</a>
        </nav>
    </head>
    <body>
     <img src="static/images/about1.jpg" width="100%" height="100%" alt="Home">
     <div class="nav-container">
    <h1>Your Tasks</h1>

    {% for row in tasks %}
<div class="task-card">
    <div class="task-content">
        <span class="task-text">{{row[1]}}</span>
        <p class="task-desc">{{row[2]}}</p>
    </div>

    <div class="task-actions">
        <form method="POST"> 
            <input type="hidden" name="ID" value="{{ row[0] }}">
            <button type="submit" class="btn-delete">Delete</button>
        </form>
    </div>
</div>
{% endfor %}
</div>
</body>
</html>
